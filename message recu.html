
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messages reçus – Calculatrice</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: url('d.jpg') no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: brightness(0.9);
      -webkit-backdrop-filter: brightness(0.9);
    }

    .table-container {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 30px;
      max-width: 1000px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    h2 {
      font-weight: bold;
      color: #212529;
    }

    table th, table td {
      vertical-align: middle;
    }

    .btn-outline-dark {
      margin-top: 20px;
    }

    .password-container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

  <div id="passwordContainer" class="password-container">
    <h2 class="text-center mb-4">Entrer le mot de passe</h2>
    <input type="password" id="passwordInput" class="form-control mb-3" placeholder="Mot de passe" />
    <button id="submitPassword" class="btn btn-primary">Valider</button>
    <div id="errorMessage" class="text-danger mt-2"></div>
  </div>

  <div id="tableContainer" class="table-container" style="display: none;">
    <h2 class="text-center mb-4">Messages reçus</h2>

    <div class="table-responsive">
      <table class="table table-bordered table-hover">
        <thead>
          <tr>
            <th>N°</th>
            <th>Nom</th>
            <th>E-mail</th>
            <th>Type de message</th>
            <th>Message</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="messagesTableBody">
          <!-- Les messages seront affichés ici -->
        </tbody>
      </table>
    </div>

    <div class="text-center">
      <a href="contact.html" class="btn btn-outline-dark">Retour au formulaire</a>
    </div>
  </div>

  <script>
    const correctPassword = "rodrigue rk";

    document.getElementById("submitPassword").onclick = function() {
      const passwordInput = document.getElementById("passwordInput").value;
      if (passwordInput === correctPassword) {
        document.getElementById("passwordContainer").style.display = "none";
        document.getElementById("tableContainer").style.display = "block";
        loadMessages();
      } else {
        document.getElementById("errorMessage").innerText = "Mot de passe incorrect veillez ressayer.";
      }
    };

    function loadMessages() {
      const messages = JSON.parse(localStorage.getItem("messagesCalculatrice")) || [];
      const tableBody = document.getElementById("messagesTableBody");

      if (messages.length === 0) {
        tableBody.innerHTML = "<tr><td colspan='7' class='text-center'>Aucun message pour le moment.</td></tr>";
      } else {
        messages.forEach((message, index) => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${message.nom}</td>
            <td>${message.email}</td>
            <td>${message.type}</td>
            <td>${message.contenu}</td>
            <td>${message.date}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteMessage(${index})">Supprimer</button></td>
          `;

          tableBody.appendChild(row);
        });
      }
    }

    function deleteMessage(index) {
      const messages = JSON.parse(localStorage.getItem("messagesCalculatrice")) || [];
      messages.splice(index, 1); // Supprime le message à l'index donné
      localStorage.setItem("messagesCalculatrice", JSON.stringify(messages)); // Met à jour le localStorage
      loadMessages(); // Recharge les messages
    }
  </script>
</body>
</html>
