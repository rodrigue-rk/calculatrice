
<!DOCTYPE html>
<html lang="fr">
<head>
  <link
  href="https://cdn.jsdelivr.net/npm/bootstrap5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculatrice Scientifique Web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative; /* Ajouté pour le positionnement du bouton */
    }

    .calculator {
      background-color: #ffffff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 360px;
    }

    #display {
      width: 100%;
      height: 60px;
      text-align: right;
      font-size: 2rem;
      border: 2px solid #ccc;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 10px;
    }

    .button {
      width: 60px;
      height: 60px;
      font-size: 1.5rem;
      margin: 5px;
      text-align: center;
      line-height: 60px;
      background-color: #f0f0f0;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .button:active,
    .button.active {
      background-color: #ddd;
    }

    #history {
      margin-top: 20px;
      max-height: 150px;
      overflow-y: auto;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }

    #history div {
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    /* Style pour le bouton de changement de couleur */
    #colorButton {
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" id="display" readonly>
    <div class="buttons">
      <button class="button">7</button>
      <button class="button">8</button>
      <button class="button">9</button>
      <button class="button">/</button>

      <button class="button">4</button>
      <button class="button">5</button>
      <button class="button">6</button>
      <button class="button">*</button>

      <button class="button">1</button>
      <button class="button">2</button>
      <button class="button">3</button>
      <button class="button">-</button>

      <button class="button">0</button>
      <button class="button">.</button>
      <button class="button">=</button>
      <button class="button">+</button>

      <button class="button">sin</button>
      <button class="button">cos</button>
      <button class="button">tan</button>
      <button class="button">√</button>

      <button class="button">log</button>
      <button class="button">exp</button>
      <button class="button">MS</button>
      <button class="button">MR</button>

      <button class="button">M+</button>
      <button class="button">M-</button>
      <button class="button">MC</button>
      <button class="button">C</button>
    </div>
    <div id="history"></div>
  </div>

  <button id="colorButton" class="btn btn-outline-dark">Changer Couleur</button>

  <script>
    const display = document.getElementById("display");
    const history = document.getElementById("history");
    const buttons = document.querySelectorAll(".button");
    let currentInput = "";
    let memory = 0;
    let colorIndex = 0;
    const colors = ["#ffffff", "#28a745", "#000000"]; // Couleurs : blanc, vert, noir

    function appendToDisplay(value) {
      currentInput += value;
      display.value = currentInput;
    }

    function calculate() {
      try {
        const result = eval(currentInput);
        history.innerHTML += `<div>${currentInput} = ${result}</div>`;
        display.value = result;
        currentInput = result.toString();
      } catch (error) {
        display.value = "Erreur";
        currentInput = "";
      }
    }

    function clearDisplay() {
      currentInput = "";
      display.value = currentInput;
    }

    function calculateScientific(func) {
      try {
        let result;
        const inputVal = parseFloat(currentInput);
        switch (func) {
          case 'sin': result = Math.sin(inputVal); break;
          case 'cos': result = Math.cos(inputVal); break;
          case 'tan': result = Math.tan(inputVal); break;
          case 'log': result = Math.log10(inputVal); break;
          case 'exp': result = Math.exp(inputVal); break;
          case '√': result = Math.sqrt(inputVal); break;
          default: result = inputVal;
        }
        history.innerHTML += `<div>${func}(${currentInput}) = ${result}</div>`;
        display.value = result;
        currentInput = result.toString();
      } catch (error) {
        display.value = "Erreur";
        currentInput = "";
      }
    }

    function memoryStore() {
      memory = parseFloat(display.value);
    }

    function memoryRecall() {
      currentInput = memory.toString();
      display.value = currentInput;
    }

    function memoryAdd() {
      memory += parseFloat(display.value);
    }

    function memorySubtract() {
      memory -= parseFloat(display.value);
    }

    function memoryClear() {
      memory = 0;
    }

    buttons.forEach(button => {
      button.addEventListener("click", function () {
        const value = this.textContent.trim();
        if (!isNaN(value) || ['+', '-', '*', '/', '.'].includes(value)) {
          appendToDisplay(value);
        } else if (value === "=") {
          calculate();
        } else if (value === "C") {
          clearDisplay();
        } else if (["sin", "cos", "tan", "log", "exp", "√"].includes(value)) {
          calculateScientific(value);
        } else if (value === "MS") {
          memoryStore();
        } else if (value === "MR") {
          memoryRecall();
        } else if (value === "M+") {
          memoryAdd();
        } else if (value === "M-") {
          memorySubtract();
        } else if (value === "MC") {
          memoryClear();
        }
      });
    });

    function highlightButton(value) {
      buttons.forEach(btn => {
        if (btn.textContent.trim() === value) {
          btn.classList.add("active");
          setTimeout(() => btn.classList.remove("active"), 150);
        }
      });
    }

    document.addEventListener("keydown", function(event) {
      const key = event.key;
      if (key >= '0' && key <= '9' || ['+', '-', '*', '/', '.'].includes(key)) {
        appendToDisplay(key);
        highlightButton(key);
      } else if (key === 'Enter') {
        event.preventDefault();
        calculate();
        highlightButton('=');
      } else if (key === 'Backspace') {
        currentInput = currentInput.slice(0, -1);
        display.value = currentInput;
      } else if (key === 'Escape') {
        clearDisplay();
        highlightButton('C');
      }
    });

    // Fonction pour changer la couleur de la calculatrice
    document.getElementById("colorButton").addEventListener("click", function() {
      colorIndex = (colorIndex + 1) % colors.length;
      document.querySelector(".calculator").style.backgroundColor = colors[colorIndex];
    });
  </script>
  <div class="text-center mt-3">
        <a href="index.html" class="btn btn-outline-dark">Retour a l'accueil</a>
      </div>

</body>
</html>
