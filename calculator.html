<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rodrigo Programming - Accueil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-image: url('E.jpg'); /* Place ton image ici */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 1px 1px 3px black;
    }

    .hero-box {
      background: rgba(0, 0, 0, 0.6);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 650px;
      width: 90%;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 20px;
    }

    .btn-custom {
      margin: 10px;
      padding: 12px 25px;
      font-size: 1.05rem;
      border-radius: 10px;
      background-color: #0d47a1;
      color: white;
      border: none;
      transition: all 0.3s ease;
      display: inline-block;
      text-decoration: none;
    }

    .btn-custom:hover {
      background-color: #1565c0;
      box-shadow: 0 6px 15px rgba(21, 101, 192, 0.5);
      transform: translateY(-3px) scale(1.03);
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    footer {
      position: absolute;
      bottom: 20px;
      color: #fff;
      font-weight: bold;
    }

    @media (max-width: 576px) {
      .button-group {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="hero-box">
    <h1>Bienvenue sur la Calculatrice Web</h1>
    <p>Développée par Rodrigo Programming pour faciliter vos opérations en ligne. Cliquez sur une page pour continuer :</p>
    <div class="button-group">
      <a href="calculatrice.html" class="btn btn-custom">Commencer les calculs</a>
      <a href="Foctionnement.html" class="btn btn-custom">Fonctionnement</a>
      <a href="contact.html" class="btn btn-custom">Suggestions</a>
      <a href="A propos.html" class="btn btn-custom">À propos</a>
      <a href="message recu.html" class="btn btn-custom">message</a>
    </div>
  </div>
  <footer>Rodrigo Programming en œuvre</footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
